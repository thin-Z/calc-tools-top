        </nav>

    <main>
        <div class="tool-page">
            <div class="tool-header">
                <h1>🔍 文本对比工具</h1>
                <p>并排比较两个文本，高亮显示新增、删除与未变更的内容。</p>
            </div>
            <div class="detail-like-wrap"><button class="like-btn detail-like" data-like-id="text-diff"><span class="heart">❤</span> <span class="count">0</span></button></div>

            <div class="ad-slot ad-placeholder">广告位 - 招商中</div>

            <div class="diff-container">
                <div class="diff-pane">
                    <label style="font-size:0.9rem;font-weight:600;margin-bottom:4px;display:block;">原始文本</label>
                    <textarea class="text-input" id="textInput1" placeholder="输入第一段文本..." oninput="scheduleDiff()">你好，欢迎使用文本对比工具！
这是第一行。
第三行未改变。</textarea>
                </div>
                <div class="diff-pane">
                    <label style="font-size:0.9rem;font-weight:600;margin-bottom:4px;display:block;">新文本</label>
                    <textarea class="text-input" id="textInput2" placeholder="输入第二段文本..." oninput="scheduleDiff()">你好，欢迎使用文本对比工具！
这是修改后的第二行。
第三行未改变。
第四行是新内容。</textarea>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn btn-primary" onclick="doDiff()">🔄 对比</button>
                <button class="btn btn-secondary" onclick="clearDiff()">清空</button>
            </div>

            <div id="diffStats" class="diff-stats"></div>

            <div class="diff-output">
                <div class="diff-pane-result">
                    <div class="diff-header">原始</div>
                    <div class="diff-content" id="diffLeft"></div>
                </div>
                <div class="diff-pane-result">
                    <div class="diff-header">新</div>
                    <div class="diff-content" id="diffRight"></div>
                </div>
            </div>

            <div class="seo-content">
                <h2>关于文本对比</h2>
                <p>文本对比是一种比较两个文本块差异的技术。本工具使用 LCS（最长公共子序列）算法进行逐行比较。</p>
                <ul>
                    <li><strong style="color:#16a34a;">绿色背景</strong>：新增内容</li>
                    <li><strong style="color:#dc2626;">红色背景 + 删除线</strong>：删除内容</li>
                    <li><strong>白色背景</strong>：未变更内容</li>
                </ul>
                <h3>使用场景</h3>
                <ul>
                    <li>代码版本对比</li>
                    <li>文章修改前后对比</li>
                    <li>文档校对</li>
                    <li>数据差异分析</li>
                </ul>
            </div>
