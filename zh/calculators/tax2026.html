    <script>
        let chartInstance = null;

        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function formatRate(rate) {
            return (rate * 100).toFixed(0) + "%";
        }

        function doCalculate() {
            const salary = parseFloat(document.getElementById("salary").value);
            const insurance = parseFloat(document.getElementById("insurance").value);
            const specialDeduction = parseFloat(document.getElementById("specialDeduction").value);

            if (!salary || salary <= 0) return;

            const result = calculateTax(salary, insurance, specialDeduction);
            const lang = getLang();
            const labels = i18n[lang];

            const resultArea = document.getElementById("resultArea");
            resultArea.style.display = "block";

            document.getElementById("taxableIncomeValue").textContent = "楼" + formatNumber(result.taxableIncome);
            document.getElementById("taxRateValue").textContent = formatRate(result.taxRate);
            document.getElementById("taxPayableValue").textContent = "楼" + formatNumber(result.taxPayable);
            document.getElementById("afterTaxValue").textContent = "楼" + formatNumber(result.afterTax);

            // 鏉″舰鍥?
            const chartContainer = document.getElementById("chartContainer");
            chartContainer.style.display = "block";

            if (chartInstance) {
                chartInstance.destroy();
            }

            const ctx = document.getElementById("taxChart").getContext("2d");
            chartInstance = new Chart(ctx, {
                type: "bar",
                data: {
                    labels: [labels.salary || "绋庡墠鏈堣柂", labels.afterTax || "绋庡悗鏈堣柂"],
                    datasets: [{
                        label: "楼",
                        data: [salary, result.afterTax],
                        backgroundColor: ["#2563eb", "#16a34a"],
                        borderRadius: 6,
                        maxBarThickness: 80
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) { return "楼" + formatNumber(value); }
                            }
                        }
                    }
                }
            });
        }

        function resetForm() {
            document.getElementById("salary").value = 15000;
            document.getElementById("insurance").value = 2000;
            document.getElementById("specialDeduction").value = 2000;
            document.getElementById("resultArea").style.display = "none";
            document.getElementById("chartContainer").style.display = "none";
            if (chartInstance) {
                chartInstance.destroy();
                chartInstance = null;
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll("[data-i18n]").forEach(function(el) {
                const key = el.getAttribute("data-i18n");
                el.textContent = t(key);
            });
            setTimeout(doCalculate, 100);
