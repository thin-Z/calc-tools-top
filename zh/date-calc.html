                "text": "选择"日期推算"模式，输入起始日期和要加减的天数，即可得出目标日期。支持正数（未来）和负数（过去）天数。"
            }
        },
        {
            "@type": "Question",
            "name": "工作日计算包含法定节假日吗？",
            "acceptedAnswer": {

<body>
    <header>
        <a href="/" class="logo"><img src="/assets/logo-h.svg" alt="工具箱里" class="site-logo"></a>
        <nav>
            <a href="/"><span data-i18n="siteName">首页</span></a>
            <select class="lang-switch" onchange="switchLang(this.value)">
                <option value="zh" selected>🇨🇳 中文</option>
                <option value="en">🇬🇧 English</option>
            </select>
        </nav>
    </header>

    <main>
        <div class="page-header">
            <h1 data-i18n="dateCalcTitle">日期计算器</h1>
            <p data-i18n="dateCalcDescFull">日期差计算、日期推算、工作日天数计算</p>
        </div>
            <div class="detail-like-wrap"><button class="like-btn detail-like" data-like-id="date-calc"><span class="heart">❤</span> <span class="count">0</span></button></div>

        <!-- 广告位 A -->
        <div class="ad-slot ad-placeholder" data-i18n="adPlaceholder">广告位 - 招商中</div>

        <div class="calculator-form">
            <h2 data-i18n="dateCalcTitle">日期计算器</h2>

            <!-- 模式切换 -->
            <div style="display:flex;gap:12px;margin-bottom:24px;justify-content:center;">
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 16px;border:2px solid var(--primary);border-radius:var(--radius);font-weight:600;font-size:0.95rem;background:var(--primary-light);color:var(--primary);" id="modeALabel">
                    <input type="radio" name="calcMode" value="A" checked onchange="toggleMode()" style="accent-color:var(--primary);">
                    <span data-i18n="modeA">日期推算</span>
                </label>
                <label style="display:flex;align-items:center;gap:6px;cursor:pointer;padding:8px 16px;border:2px solid var(--border);border-radius:var(--radius);font-weight:500;font-size:0.95rem;background:var(--bg-card);color:var(--text-secondary);" id="modeBLabel">
                    <input type="radio" name="calcMode" value="B" onchange="toggleMode()" style="accent-color:var(--primary);">
                    <span data-i18n="modeB">日期差</span>
                </label>
            </div>

            <form id="dateForm" onsubmit="return false;">
                <!-- 模式 A 字段 -->
                <div id="modeAFields">
                    <div class="form-group">
                        <label for="startDateA" data-i18n="startDate">开始日期</label>
                        <input type="date" id="startDateA">
                    </div>
                    <div class="form-group">
                        <label for="daysInput" data-i18n="daysToAdd">添加天数</label>
                        <input type="number" id="daysInput" value="0" step="1">
                        <div style="font-size:0.8rem;color:var(--text-secondary);margin-top:4px;">支持负数（往前推算）</div>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="calcModeA()" data-i18n="calculate">开始计算</button>
                        <button type="reset" class="btn btn-secondary" onclick="resetForm()" data-i18n="reset">重置</button>
                    </div>
                </div>

                <!-- 模式 B 字段 -->
                <div id="modeBFields" style="display:none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="startDateB" data-i18n="startDate">开始日期</label>
                            <input type="date" id="startDateB">
                        </div>
                        <div class="form-group">
                            <label for="endDate" data-i18n="endDate">结束日期</label>
                            <input type="date" id="endDate">
                        </div>
                    </div>
                    <div class="btn-group">
                        <button type="button" class="btn btn-primary" onclick="calcModeB()" data-i18n="calculateDiff">计算日期差</button>
                        <button type="reset" class="btn btn-secondary" onclick="resetForm()" data-i18n="reset">重置</button>
                    </div>
                </div>
            </form>

            <!-- 结果区域 -->
            <div id="resultArea" class="result-card" style="display:none;">
                <h3 data-i18n="result">计算结果</h3>
                <!-- 模式 A 结果 -->
                <div id="resultA">
                    <div>
                        <div style="font-size:0.85rem;color:var(--text-secondary);" data-i18n="dateResult">目标日期</div>
                        <div class="result-value" id="resultDate"></div>
                    </div>
                    <div style="margin-top:8px;">
                        <div style="font-size:0.85rem;color:var(--text-secondary);" data-i18n="dayOfWeek">星期</div>
                        <div style="font-size:1.4rem;font-weight:700;margin-top:4px;" id="resultDayOfWeek"></div>
                    </div>
                </div>
                <!-- 模式 B 结果 -->
                <div id="resultB" style="display:none;">
                    <div>
                        <div style="font-size:0.85rem;color:var(--text-secondary);" data-i18n="daysDiff">间隔天数</div>
                        <div class="result-value" id="resultDaysDiff"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 广告位 B -->
        <div class="ad-slot ad-placeholder" data-i18n="adPlaceholder">广告位 - 招商中</div>
    
<div class="tool-content">
    <h2>日期计算器使用说明</h2>
    <p>日期计算器提供两种计算模式：日期差计算和日期推算。无论是计算项目周期、合同期限，还是规划行程安排，都能快速得到准确结果。</p>
    <h3>使用场景</h3>
    <p>计算两个日期之间的间隔天数、推算某个日期前后 N 天的日期、计算工作日天数。适用于合同管理、项目管理、旅行规划等场景。</p>
</div>
<div class="related-tools">
    <h3>相关工具</h3>
    <ul>
        <li><a href="/zh/mortgage.html">房贷计算器</a></li>
        <li><a href="/zh/bmi.html">BMI 计算器</a></li>
    </ul>
</div>
</main>

    <footer>
        <p data-i18n="copyright">© 2026 在线工具 | 免费工具</p>
    </footer>

    <script>
        function toggleMode() {
            const mode = document.querySelector('input[name="calcMode"]:checked').value;
            const modeAFields = document.getElementById('modeAFields');
            const modeBFields = document.getElementById('modeBFields');
            const labelA = document.getElementById('modeALabel');
            const labelB = document.getElementById('modeBLabel');

            if (mode === 'A') {
                modeAFields.style.display = 'block';
                modeBFields.style.display = 'none';
                labelA.style.borderColor = 'var(--primary)';
                labelA.style.background = 'var(--primary-light)';
                labelA.style.color = 'var(--primary)';
                labelA.style.fontWeight = '600';
                labelB.style.borderColor = 'var(--border)';
                labelB.style.background = 'var(--bg-card)';
                labelB.style.color = 'var(--text-secondary)';
                labelB.style.fontWeight = '500';
            } else {
                modeAFields.style.display = 'none';
                modeBFields.style.display = 'block';
                labelB.style.borderColor = 'var(--primary)';
                labelB.style.background = 'var(--primary-light)';
                labelB.style.color = 'var(--primary)';
                labelB.style.fontWeight = '600';
                labelA.style.borderColor = 'var(--border)';
                labelA.style.background = 'var(--bg-card)';
                labelA.style.color = 'var(--text-secondary)';
                labelA.style.fontWeight = '500';
            }
            document.getElementById('resultArea').style.display = 'none';
        }

        function calcModeA() {
            const startDate = document.getElementById('startDateA').value;
            const days = parseInt(document.getElementById('daysInput').value);

            if (!startDate) {
                alert(getLang() === 'zh' ? '请选择开始日期' : 'Please select a start date');
                return;
            }
            if (isNaN(days)) {
                alert(getLang() === 'zh' ? '请输入有效天数' : 'Please enter a valid number of days');
                return;
            }

            const result = addDays(startDate, days);
            const dow = getDayOfWeek(result);
            const lang = getLang();
            const dowText = lang === 'zh' ? dow.zh : dow.en;

            document.getElementById('resultDate').textContent = result;
            document.getElementById('resultDayOfWeek').textContent = dowText;
            document.getElementById('resultA').style.display = 'block';
            document.getElementById('resultB').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
        }

        function calcModeB() {
            const startDate = document.getElementById('startDateB').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate || !endDate) {
                alert(getLang() === 'zh' ? '请选择开始日期和结束日期' : 'Please select both start and end dates');
                return;
            }

            const diff = daysBetween(startDate, endDate);
            document.getElementById('resultDaysDiff').textContent = diff + ' ' + (getLang() === 'zh' ? '天' : 'days');
            document.getElementById('resultA').style.display = 'none';
            document.getElementById('resultB').style.display = 'block';
            document.getElementById('resultArea').style.display = 'block';
        }

        function resetForm() {
            const today = todayStr();
            document.getElementById('startDateA').value = today;
            document.getElementById('daysInput').value = 0;
            document.getElementById('startDateB').value = today;
            document.getElementById('endDate').value = today;
            document.getElementById('resultArea').style.display = 'none';
        }

        // 页面加载后默认填充今天
        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll("[data-i18n]").forEach(function(el) {
                const key = el.getAttribute("data-i18n");
                el.textContent = t(key);
            });
            const today = todayStr();
            document.getElementById('startDateA').value = today;
            document.getElementById('startDateB').value = today;
            document.getElementById('endDate').value = today;
        });
    </script>

    <script src="../js/cookie-consent.js" defer></script>
</body>
</html>
